<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Timetable Generator</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <link rel="stylesheet" href="./css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-white font-[Inter] text-gray-800">

<div class="max-w-6xl mx-auto p-6">

  <!-- TOP BAR -->
  <div class="flex justify-between items-center mb-4">

    <select id="langSelect" class="border p-2 rounded">
      <option value="en">English</option>
      <option value="de">Deutsch</option>
    </select>

    <h1 id="title" class="text-2xl font-bold text-blue-600"></h1>

    <div class="flex gap-2">
      <button id="exportBtn" class="btn-primary">Export</button>
      <button id="clearBtn" class="btn-secondary">Clear</button>
    </div>
  </div>

  <!-- SLOT CREATOR -->
  <div class="flex gap-2 items-center mb-3">
    <input id="startTime" type="time" class="border p-2 rounded">
    <input id="endTime" type="time" class="border p-2 rounded">
    <button id="addSlotBtn" class="btn-primary"></button>
  </div>

  <div id="timetable" class="grid-container shadow-md rounded-lg overflow-hidden"></div>
</div>

<!-- MODAL (CUSTOM UI) -->
<div id="modal" class="modal hidden">
  <div class="modal-box">

    <h2 id="modalTitle"></h2>

    <input id="subjectName" type="text" placeholder="Subject" class="modal-input">

    <input id="colorPicker" type="color" class="w-full h-10">

    <div class="flex justify-end gap-2 mt-3">
      <button id="cancelBtn" class="btn-secondary"></button>
      <button id="saveBtn" class="btn-primary"></button>
    </div>

  </div>
</div>

<script src="./js/script.js"></script>
</body>
</html>
